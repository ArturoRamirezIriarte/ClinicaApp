name: Keep Supabase alive
on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -f "${{ secrets.SUPABASE_URL }}/rest/v1/empresas?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"